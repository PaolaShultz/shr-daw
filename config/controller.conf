# SHR-DAW generic controller mapping v4.
# `shr-setup` applies a matching profile or offers MIDI learn. Keeping this
# template empty prevents an unknown controller from inheriting another
# device's notes and CCs.
profile=
menu.layout=8
encoder.relative_cc=
encoder.relative_reverse=false
encoder.press_cc=
encoder.press_note=
encoder.press_channel=
lock.cc=
# Note/CC commands may optionally include a 1-based channel, for example:
# pad.10.36=page-1
# button.cc.10.44=stop
# Positions 5–8 are contextual STOP/PANIC, PLAY/LOAD/PREVIEW, REC, and TAP
# anchors. Legacy item-1 through item-4 names still load in the same order.
