# SHSynth controller mapping v1
# Optional exact/substring preference; omit to use shsynth.conf midi.input list.
# input=MiniLab

# Main encoder: relative CC values below/above 64 turn left/right; press is 127/0.
encoder.relative_cc=28
encoder.press_cc=118

# Raw Arturia Shift CC toggles command-pad lock. Shifted pad-layer CCs are unused.
lock.cc=27

# Physical incoming CC = synthv1 mapped control CC. Other backends receive
# these physical CC messages normally and do not inherit synthv1 parameters.
cc.74=74
cc.71=71
cc.76=76
cc.77=77
cc.93=93
cc.18=18
cc.19=19
cc.16=16
cc.82=82
cc.83=83
cc.85=85
cc.17=17

# Physical note = command action.
pad.36=arp
pad.37=pad
pad.38=prog
pad.39=loop
pad.40=stop
pad.41=play
pad.42=rec
pad.43=tap-tempo
